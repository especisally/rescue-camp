<script>
        function switchMainTab(type) {
            const subjectsBtn = document.getElementById('tab-subjects');
            const ageBtn = document.getElementById('tab-age');
            const listContainer = document.getElementById('standards-list');

            if (type === 'subjects') {
                subjectsBtn.classList.add('bg-surface', 'text-primary', 'shadow-sm', 'font-bold');
                subjectsBtn.classList.remove('text-on-surface-variant');
                ageBtn.classList.remove('bg-surface', 'text-primary', 'shadow-sm', 'font-bold');
                ageBtn.classList.add('text-on-surface-variant');
                renderSubjects();
            } else {
                ageBtn.classList.add('bg-surface', 'text-primary', 'shadow-sm', 'font-bold');
                ageBtn.classList.remove('text-on-surface-variant');
                subjectsBtn.classList.remove('bg-surface', 'text-primary', 'shadow-sm', 'font-bold');
                subjectsBtn.classList.add('text-on-surface-variant');
                renderAgeSegments();
            }
        }

        function switchCategory(element) {
            const buttons = element.parentElement.querySelectorAll('button');
            buttons.forEach(btn => {
                btn.classList.remove('side-nav-active');
                btn.classList.add('text-tertiary');
            });
            element.classList.add('side-nav-active');
            element.classList.remove('text-tertiary');
        }

        function renderSubjects() {
            const list = document.getElementById('standards-list');
            list.innerHTML = `
                <div class="space-y-stack-md">
                    ${generateCard('3000米跑', "基础课目", "13'30\" (及格)")}
                    ${generateCard('单杠引体向上', "力量素质", "12次 (及格)")}
                    ${generateCard('双杠臂屈伸', "力量素质", "16次 (及格)")}
                    ${generateCard('俯卧撑', "肌肉耐力", "40次/2min")}
                </div>
            `;
        }

        function renderAgeSegments() {
            const list = document.getElementById('standards-list');
            list.innerHTML = `
                <div class="bg-surface-container-lowest rounded-xl border border-surface-variant overflow-hidden">
                    ${generateListItem('24岁及以下', '1类人员标准')}
                    ${generateListItem('25 - 27岁', '1类人员标准')}
                    ${generateListItem('28 - 30岁', '2类人员标准')}
                    ${generateListItem('31 - 33岁', '2类人员标准')}
                    ${generateListItem('34 - 36岁', '3类人员标准')}
                    ${generateListItem('37 - 39岁', '3类人员标准')}
                    ${generateListItem('40岁及以上', '4类人员标准')}
                </div>
            `;
        }

        function generateCard(title, category, standard) {
            return `
                <div class="bg-surface-container-lowest border border-surface-variant rounded-xl overflow-hidden shadow-sm active:scale-95 transition-transform duration-100">
                    <div class="relative h-24 bg-cover bg-center" style="background-image: url('placeholder')" data-alt="A professional rescue training visualization for ${title}. High-contrast tactical lighting, corporate modernism aesthetic, firefighting gear elements, and a focus on physical excellence.">
                        <div class="absolute inset-0 bg-black/40 flex items-center justify-center">
                            <h3 class="text-white font-headline-md text-headline-md-mobile font-bold">${title}</h3>
                        </div>
                    </div>
                    <div class="p-3 flex justify-between items-center">
                        <div class="flex flex-col">
                            <span class="text-label-md font-label-md text-tertiary uppercase">${category}</span>
                            <span class="text-body-md font-body-md font-bold text-on-surface">标准：${standard}</span>
                        </div>
                        <span class="material-symbols-outlined text-secondary" data-icon="chevron_right">chevron_right</span>
                    </div>
                </div>
            `;
        }

        function generateListItem(age, tag) {
            return `
                <div class="flex items-center justify-between p-4 border-b border-surface-variant last:border-0 active:bg-surface-container-high transition-colors">
                    <div class="flex flex-col">
                        <span class="text-body-lg font-body-lg font-bold">${age}</span>
                        <span class="text-label-md font-label-md text-tertiary">${tag}</span>
                    </div>
                    <div class="flex items-center gap-2 text-secondary">
                        <span class="text-label-md font-label-md">查看详细</span>
                        <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
                    </div>
                </div>
            `;
        }
    </script>
